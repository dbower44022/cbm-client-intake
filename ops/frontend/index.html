<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cleveland Business Mentors — Submission Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&family=Roboto+Slab:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/shared/tokens.css" />
  <link rel="stylesheet" href="/shared/vendor/jodit/jodit.min.css" />
  <link rel="stylesheet" href="/shared/conversation.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="ops">
    <!-- Top bar: title left, live search center, user corner right. -->
    <header class="ops__topbar">
      <div class="ops__title">
        <h1>Submission Admin</h1>
        <p class="ops__sub">Captured submissions, delivery status, and follow-up.</p>
      </div>
      <div class="ops__search">
        <input type="search" id="searchBox" placeholder="Search submissions…"
               aria-label="Search submissions" autocomplete="off" />
      </div>
      <div class="ops__usercorner" id="userCorner" hidden>
        <span class="ops__who">Signed in as <strong id="whoName"></strong></span>
        <button type="button" class="cbm-button cbm-button--secondary" id="logoutBtn">Sign out</button>
      </div>
    </header>

    <!-- Sign-in happens at the portal (/); this shows access/server errors. -->
    <section class="ops__login" id="msgView" hidden>
      <p class="form-error" id="msgText" role="alert"></p>
      <p><a href="/">Return to the sign-in page</a></p>
    </section>

    <!-- List view -->
    <section class="ops__dash" id="dashView" hidden>
      <div class="ops__controls">
        <select id="resolvedFilter" aria-label="Open or resolved">
          <option value="open">Open</option>
          <option value="resolved">Resolved</option>
          <option value="">All</option>
        </select>
        <select id="statusFilter" aria-label="Filter by status"></select>
        <select id="formFilter" aria-label="Filter by form"></select>
        <div class="ops__counts" id="counts"></div>
        <span class="ops__metrics" id="metrics"></span>
        <button type="button" class="cbm-button cbm-button--secondary" id="refreshBtn">Refresh</button>
      </div>

      <p class="ops__notice" id="notice" role="status" hidden></p>

      <div class="ops__gridwrap" id="gridWrap">
        <table class="ops__table" id="subTable" hidden>
          <thead id="subHead"></thead>
          <tbody id="subBody"></tbody>
        </table>
        <p class="ops__empty" id="emptyState" hidden>No submissions match.</p>
        <p class="ops__loading" id="loadingState">Loading…</p>
      </div>
    </section>

    <!-- Detail view (replaces the old modal): Overview / Details / Communications -->
    <section class="ops__detail" id="detailView" hidden>
      <div class="ops__detail-head">
        <button type="button" class="cbm-button cbm-button--secondary" id="backBtn">← Back</button>
        <span class="ops__detail-heading">
          <h2 id="detailTitle">Submission</h2>
          <span id="detailBadge"></span>
        </span>
        <span class="ops__detail-actions" id="detailActions"></span>
      </div>
      <p class="ops__notice" id="detailNotice" role="status" hidden></p>

      <!-- presence line: who else is looking at this right now -->
      <div class="ops__presence" id="presence" hidden></div>

      <nav class="ops__tabs" id="detailTabs" role="tablist"></nav>

      <div class="ops__panel" data-panel="overview">
        <div class="ops__ov">
          <aside class="ops__facts" id="ovFacts"></aside>
          <div class="ops__ov-main">
            <!-- Discussion (internal comments) + Activity, side by side -->
            <div class="ops__duo">
              <section class="ops__col" id="discussionCol"></section>
              <section class="ops__col" id="activityCol"></section>
            </div>
            <div class="ops__conv">
              <div class="ops__conv-head">
                <h3>Conversation with the submitter</h3>
                <span class="ops__conv-actions" id="convActions"></span>
              </div>
              <div id="convList"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="ops__panel" data-panel="details" hidden>
        <div id="detailBody"></div>
      </div>

      <div class="ops__panel" data-panel="communications" hidden>
        <div class="ops__conv-head">
          <h3>Email history</h3>
          <span id="commActions"></span>
        </div>
        <div id="commList"></div>
      </div>
    </section>

    <footer class="cbm-footer">
      <p>&copy; <span data-cbm-year>2026</span> Cleveland Business Mentors.<span class="cbm-footer__version" data-cbm-version></span></p>
    </footer>
  </main>

  <!-- busy.js first: it wraps fetch/XHR, so it must be in place before any
       other script can start a request. -->
  <script src="/shared/busy.js"></script>
  <script src="/shared/vendor/jodit/jodit.min.js"></script>
  <script src="/shared/richtext.js"></script>
  <script src="/shared/quickmail.js"></script>
  <script src="/shared/conversation.js"></script>
  <script src="app.js"></script>
  <script src="/shared/footer.js"></script>
</body>
</html>
